# =============================================================================
# QM/MM 量子环境编码器 (QMEnvironmentEncoder) 预训练配置
# 适用于：单机 4×RTX 3090 DDP 训练
# 启动命令：python src/train_qmmm.py --config configs/train_qmmm_config.yaml
# =============================================================================

# ── 随机种子 ───────────────────────────────────────────────────────────────────
seed: 42          # 固定随机种子，保证实验可复现（影响模型初始化、数据打乱等）

# ── 分布式训练 (DDP) ──────────────────────────────────────────────────────────
nprocs: 3         # 当前机器使用的 GPU 数量（配置为 4×RTX 3090）
nnodes: 1         # 机器节点数（单机训练固定为 1；多机需改为实际节点数）
master_port: 29500 # DDP 进程间通信端口，若被占用请换为其他端口（如 29501）

# ── 日志与检查点 ──────────────────────────────────────────────────────────────
log_dir: "results/qmmm_encoder"  # TensorBoard 日志 + 最优 checkpoint 保存目录
                                  # 会自动创建，可按需修改为绝对路径
checkpoint_path: null             # 断点续训：填写 .pt 路径则加载并继续训练
                                  # null = 从头开始训练，随机初始化模型权重
log_steps: 50     # 每隔多少训练步，打印一次 train/loss 并写入 TensorBoard

# ── 训练控制 ──────────────────────────────────────────────────────────────────
steps: 1000000    # 总训练步数上限（1M，与 QM9 基准对齐）
                  # 实际训练可根据 val NMAPE 曲线提前停止

# =============================================================================
# 数据配置
# =============================================================================
data:
  # 数据根目录：应包含若干 .h5/.hdf5 格式的分片 HDF5 文件
  # DensityData 会自动扫描并合并该目录下所有 HDF5 文件
  data_root: "/home/hk/project/qmmm_hdf5"

  # 批次大小（每张 GPU 每步处理的样本数）
  # 单卡显存：RTX 3090 24GB；batch_size=8 在 mul=500,lmax=4 下约占 18-20GB
  # 若显存不足，可减小至 4 或 2
  batch_size: 4

  # 探针采样数：每个样本在训练/验证/测试时随机抽取的探针点数
  # 较多的探针覆盖更多 NCI 区域，但显存占用更高
  train_probes: 500    # 训练时每样本采样 500 个探针
  val_probes:   1000   # 验证时每样本采样 1000 个探针（更精确的评估）
  test_probes:  1000   # 测试时探针数（可设为 null 使用全部探针）

  # 验证集比例：按 val_frac 随机从全数据中划出一部分作为验证集
  val_frac: 0.005      # 0.5% 作为验证集（剩余 99.5% 为训练集）

  # 自定义分割文件路径（.json 格式，含 train/validation/test 键）
  # null = 按照 val_frac 自动随机划分，不保留独立测试集
  split_file: null

  # DataLoader 工作进程数
  train_workers: 8     # 训练 DataLoader 的工作线程数（建议 ≤ CPU 核数）
  val_workers:   2     # 验证 DataLoader 的工作线程数

  # 是否将数据预先锁定到 GPU 可访问的锁页内存（可加速 CPU→GPU 传输）
  # 若数据在 NVMe SSD 上，建议开启；机械硬盘上效果有限
  pin_memory: false

# =============================================================================
# 图构建配置
# =============================================================================
graph:
  # QM-QM 原子间截断半径（Å）：仅连接此半径内的 QM 原子对构成消息传递边
  # 4.0 Å 覆盖共价键 + 部分氢键距离，与 QM9 基准一致
  cutoff: 4.0

# =============================================================================
# 模型超参数 (QMEnvironmentEncoder)
# =============================================================================
model:
  # ── E3 等变消息传递参数 ───────────────────────────────────────────────────
  # 消息传递层数 K：同时决定 EquivariantFusionBottleneck 的融合层数
  # K=3 提供足够的多跳感受野（3 跳 12 埃 以内的环境信息）
  num_interactions: 3

  # 每个 irrep 的通道倍数（multiplicities）
  # mul=500 + lmax=4 → 隐层维度约 ~2500（全 irrep 展开）
  # 降低 mul 可显著减少显存和参数量（如 mul=128 约占原 1/4）
  mul: 500

  # 最大角量子数：控制球谐函数阶数和 Clebsch-Gordan 乘积范围
  # lmax=4 包含 l=0(标量), l=1(向量), l=2(张量), l=3, l=4
  # 较大的 lmax 捕捉更精细的角度依赖性，但参数量和计算量按 O(lmax^2) 增长
  lmax: 4

  # 注：元素种类数由 QMAtomEncoder 内部通过 len(ase.data.atomic_numbers) 自动确定，
  # 约为 119，覆盖全元素周期表，无需在此配置。

  # ── 信息瓶颈投影维度 ─────────────────────────────────────────────────────
  # S_final 标量表示维度 [N_atoms, D_s]
  # D_s=256 提供足够的标量信息容量，同时保持合理的参数量
  D_s: 256

  # V_final 矢量通道数 [N_atoms, 6*D_v]（含 1o + 1e 两种宇称，各 D_v 通道）
  # 实际存储：[N, 6*D_v] (6 = 2 parity × 3 spatial dims)
  # D_v=64 提供 64 对等变向量特征（1o 奇宇称 + 1e 偶宇称）
  D_v: 64

  # ── 探针读出参数 ─────────────────────────────────────────────────────────
  # RBF 径向基函数展开维度（用于编码探针-QM原子的距离信息）
  # D_rbf=64 足以精细地描述 0~4Å 范围内的距离依赖
  D_rbf: 64

  # 注：探针读出截断半径与 graph.cutoff 共用同一值，无需单独配置。
  # EnhancedProbeReadoutModel 内部使用 QMEnvironmentEncoder 的 cutoff 参数。

# =============================================================================
# 损失函数 (LogMSELoss)
# =============================================================================
loss:
  # log(|ρ| + eps) 的数值稳定小量，防止对零取对数
  # 1e-8 对应 log(1e-8) ≈ -18.4，即当 ρ 极小时的最小响应
  eps: 1.0e-8

  # 混合标准 MSE 的权重系数（0.0 = 纯 Log-MSE）
  # 纯 Log-MSE 对所有密度量级一视同仁；适合充分预训练后的精调
  # 若训练初期出现梯度爆炸，可临时设为 0.01~0.1 以稳定训练
  mse_weight: 0.0

# =============================================================================
# 优化器 (AdamW)
# =============================================================================
optimizer:
  # 初始学习率：继承 QM9 e3 基准（train_qm9_e3_final.yaml: lr=4e-4）
  # 配合下方指数衰减，1M 步后 lr 大约降至 ~4e-4 × 10^(-1M/6000) ≈ 0
  lr: 4.0e-4

  # AdamW 权重衰减（L2 正则化）
  # 0.0 = 关闭正则化，与 QM9 基准一致
  # 若出现过拟合，可尝试 1e-4 或 1e-5
  weight_decay: 0.0

  # AdamW 一阶矩估计衰减系数（动量项）
  # 默认 0.9 适用于大多数情况
  betas: [0.9, 0.999]

  # 数值稳定小量（AdamW 内部分母中的 epsilon）
  eps: 1.0e-8

# =============================================================================
# 学习率调度器 (ExponentialLR)
# 公式：lr_t = lr_0 × gamma^t，其中 gamma = 0.1^(1/beta)
# 含义：每经过 beta 步，学习率衰减到当前值的 10%
# =============================================================================
scheduler:
  # beta：lr 衰减到初始值 10% 所需的步数
  # beta=6000 继承 QM9 e3 基准（每 6000 步 lr 降一个数量级）
  # 若希望更慢衰减（如 1M 步内保持较高 lr），可设为 50000~100000
  beta: 6000
