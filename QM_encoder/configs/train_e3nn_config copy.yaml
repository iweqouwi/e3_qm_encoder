# =============================================================================
# QM/MM 量子环境编码器预训练配置
# 支持两套模型后端（通过 model.backend 字段切换）：
#
#   backend: "painn"  →  PaiNNQMEncoder（本文件 densitymodel.py 新架构）
#                        轻量高效，F=128 基数，适合大规模 QM/MM 预训练
#
#   backend: "e3nn"   →  QMEnvironmentEncoder（e3.py E3等变架构）
#                        精度更高，但参数量和显存占用约大 10×
#
# 启动命令（单机多卡）：
#   python src/train_qmmm.py --config configs/train_qmmm_config.yaml
#
# 断点续训：
#   python src/train_qmmm.py --config configs/train_qmmm_config.yaml \
#          --checkpoint results/qmmm_encoder/checkpoint.pt
# =============================================================================

# ── 随机种子 ───────────────────────────────────────────────────────────────────
seed: 42          # 固定随机种子，保证实验可复现（影响模型初始化、数据打乱等）

# ── 分布式训练 (DDP) ──────────────────────────────────────────────────────────
nprocs: 3         # 当前机器使用的 GPU 数量
nnodes: 1         # 机器节点数（单机训练固定为 1；多机需改为实际节点数）
master_port: 29500 # DDP 进程间通信端口，若被占用请换为其他端口（如 29501）

# ── 日志与检查点 ──────────────────────────────────────────────────────────────
log_dir: "results/qmmm_encoder"  # TensorBoard 日志 + 最优 checkpoint 保存目录
checkpoint_path: null             # 断点续训：填写 .pt 路径则加载并继续训练
log_steps: 50                     # 每隔多少训练步打印一次 train/loss

# ── 训练控制 ──────────────────────────────────────────────────────────────────
steps: 1000000    # 总训练步数上限（1M）

# =============================================================================
# 数据配置
# =============================================================================
data:
  data_root: "/home/hk/project/qmmm_hdf5"

  batch_size: 4

  # 探针采样数：每个样本在训练/验证/测试时随机抽取的探针点数
  train_probes: 4096
  val_probes:   1000
  test_probes:  1000

  val_frac: 0.005        # 0.5% 作为验证集
  split_file: null

  train_workers: 8
  val_workers:   2
  pin_memory: false

# =============================================================================
# 图构建配置
# =============================================================================
graph:
  # QM-QM 原子间截断半径（Å）；同时用于探针-QM 边构建
  cutoff: 4.0

# =============================================================================
# 模型超参数
# =============================================================================
model:
  # ── 后端选择 ─────────────────────────────────────────────────────────────
  # "painn" → PaiNNQMEncoder（densitymodel.py，推荐用于预训练）
  # "e3nn"  → QMEnvironmentEncoder（e3.py，高精度但显存占用更大）
  backend: "painn"

  # ── PaiNN 后端专属参数（backend: "painn" 时生效）──────────────────────────
  painn:
    # 消息传递层数 L；同时决定 JK-Net 融合的层数
    # L=3：感受野覆盖 ~3×cutoff=12Å，足以捕获局部量子化学环境
    num_interactions: 3

    # 隐藏层通道数基数 F
    # 所有子模块（标量/矢量）的通道数均以此为基数，不写死
    # F=128：约 2.1M 参数，单卡 24GB 显存下 batch_size=8 可行
    # F=256：约 8.2M 参数，可在精度要求更高时使用
    hidden_size: 128

    # sinc RBF 展开维度（原子间距离 + 探针距离共用）
    # 默认 null → 代码内自动设为 hidden_size // 2
    # 若需手动覆盖（如 64），在此填写整数
    distance_embedding_size: null

    # 读出网络 RBF 维度（null → 自动等于 distance_embedding_size）
    D_rbf: null

    # 物理场计算数值稳定小量（防除零，通常无需修改）
    mm_eps: 1.0e-8

    # 读出层最后一层 bias 初始化值（对数密度经验均值）
    # log(ρ_mean) ≈ log(1e-5) ≈ -11.5，帮助网络快速收敛
    output_bias_init: -11.5

  # ── E3nn 后端专属参数（backend: "e3nn" 时生效）────────────────────────────
  e3nn:
    num_interactions: 3
    mul: 500           # irrep 通道倍数（控制 E3nn 网络宽度）
    lmax: 4            # 最大角量子数
    D_s: 256           # S_final 标量维度
    D_v: 64            # V_final 矢量通道数
    D_rbf: 64          # 读出网络 RBF 维度

# =============================================================================
# 损失函数 (LogMSELoss)
# =============================================================================
loss:
  eps: 1.0e-8     # log(|ρ| + eps) 的数值稳定小量
  mse_weight: 0   # 0 = 纯 Log-MSE；>0 时混入物理空间 MSE 辅助稳定训练

# =============================================================================
# 优化器 (AdamW)
# =============================================================================
optimizer:
  lr: 5.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.999]
  eps: 1.0e-8

# =============================================================================
# 学习率调度器 (ExponentialLR)
# 公式：lr_t = lr_0 × gamma^t，gamma = 0.1^(1/beta)
# 含义：每经过 beta 步，学习率衰减到当前值的 10%
# =============================================================================
scheduler:
  beta: 65000    # PaiNN 较轻量，可适当加快衰减；E3nn 建议用更大值（如 100000）
